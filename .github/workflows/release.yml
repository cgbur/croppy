name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: croppy

jobs:
  verify-tag:
    name: Verify Tag Is On Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not on main."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo +stable build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          archive="croppy-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          folder="croppy-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${folder}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${folder}/"
          tar -czf "${archive}" "${folder}"
          echo "asset=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $archiveBase = "croppy-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archiveBase | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BINARY_NAME.exe" "$archiveBase/$env:BINARY_NAME.exe"
          Compress-Archive -Path $archiveBase -DestinationPath "$archiveBase.zip"
          "asset=$archiveBase.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload bundle (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.asset }}
          if-no-files-found: error

      - name: Upload bundle (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ steps.package_windows.outputs.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" dist/* --verify-tag --generate-notes --title "${tag}" --repo "${GITHUB_REPOSITORY}"
          fi
